<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste API Uber</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    background:#2b7cff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1a5fd1;
}

pre{
    background:#eee;
    padding:10px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>Criar usuário</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<button onclick="criarUsuario()">Cadastrar</button>

<pre id="resultado"></pre>

</div>

<script>

async function criarUsuario(){

const nome = document.getElementById("nome").value
const telefone = document.getElementById("telefone").value

const resposta = await fetch("https://teste-h861.onrender.com/usuarios",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome:nome,
telefone:telefone
})
})

const dados = await resposta.json()

document.getElementById("resultado").textContent =
JSON.stringify(dados,null,2)

}

</script>

</body>
</html>
