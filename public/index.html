<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrida Simples | Login</title>
  <link rel="stylesheet" href="/styles.css">
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
  >
</head>
<body>
  <div class="page">
    <div class="auth-layout">
      <div class="auth-brand">
        <div class="badge">Corrida Simples</div>
        <h1>Bem-vindo de volta</h1>
        <p>Entre para chamar corridas ou receber chamadas como motorista, tudo em um painel simples e direto.</p>
        <p class="muted">Tarifa fixa de R$ 1,00 por km, com prioridade para motoristas mais proximos.</p>
      </div>

      <div class="card">
        <h2>Entrar</h2>
        <p>Use seu telefone ou email e senha.</p>
        <div id="loginMessage" class="message"></div>
        <form id="loginForm">
          <div class="form-field">
            <label for="loginIdentificador">Telefone ou email</label>
            <input id="loginIdentificador" placeholder="11999990000 ou email@dominio.com" required>
          </div>
          <div class="form-field">
            <label for="loginSenha">Senha</label>
            <input id="loginSenha" type="password" placeholder="Sua senha" required>
          </div>
          <div class="form-field">
            <label>Entrar como</label>
            <div class="toggle-group">
              <input type="radio" id="tipoPassageiro" name="tipo" value="passageiro" checked>
              <label for="tipoPassageiro">Passageiro</label>
              <input type="radio" id="tipoMotorista" name="tipo" value="motorista">
              <label for="tipoMotorista">Motorista</label>
            </div>
          </div>
          <button class="button" type="submit">Entrar</button>
        </form>
        <p class="muted" style="margin-top: 16px;">
          Nao tem conta? <a href="/cadastro.html">Criar conta</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin && window.location.origin.startsWith("http")
      ? window.location.origin
      : "http://localhost:10000";

    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    function showMessage(type, text) {
      loginMessage.className = `message ${type} show`;
      loginMessage.textContent = text;
    }

    function clearMessage() {
      loginMessage.className = "message";
      loginMessage.textContent = "";
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();

      const identificador = document.getElementById("loginIdentificador").value.trim();
      const senha = document.getElementById("loginSenha").value.trim();
      const tipo = document.querySelector("input[name='tipo']:checked").value;

      if (!identificador || !senha) {
        showMessage("error", "Informe seu telefone/email e senha.");
        return;
      }

      try {
        const resposta = await fetch(API_BASE + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identificador, senha, tipo })
        });
        const dados = await resposta.json();

        if (!dados.ok) {
          showMessage("error", dados.mensagem || "Falha no login.");
          return;
        }

        localStorage.setItem("corridaSession", JSON.stringify({
          usuario: dados.usuario,
          motorista: dados.motorista || null,
          logadoEm: Date.now()
        }));

        window.location.href = "/app.html";
      } catch (erro) {
        showMessage("error", "Nao foi possivel conectar. Tente novamente.");
      }
    });
  </script>
</body>
</html>
