<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrida Simples | Inicio</title>
  <link rel="stylesheet" href="/styles.css">
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
  >
  <link
    rel="stylesheet"
    href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css"
  >
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="title">
        <h1>Corrida Simples</h1>
        <span id="userSummary">Carregando sessao...</span>
      </div>
      <button class="button secondary" id="logoutBtn">Sair</button>
    </div>

    <div class="app-content">
      <div class="card" id="passengerPanel">
        <h2>Pedir corrida</h2>
        <p>Digite os enderecos e escolha a forma de pagamento.</p>
        <div id="passengerMessage" class="message"></div>

        <div class="form-field autocomplete">
          <label for="origemInput">Origem</label>
          <input id="origemInput" placeholder="Rua, numero">
          <div class="autocomplete-list hidden" id="origemList"></div>
        </div>
        <button class="button secondary" type="button" id="usarLocalizacao">Usar minha localizacao</button>

        <div class="form-field autocomplete">
          <label for="destinoInput">Destino</label>
          <input id="destinoInput" placeholder="Rua, numero">
          <div class="autocomplete-list hidden" id="destinoList"></div>
        </div>

        <div class="form-field">
          <label for="pagamentoSelect">Forma de pagamento</label>
          <select id="pagamentoSelect">
            <option value="dinheiro">Dinheiro</option>
            <option value="cartao">Cartao</option>
            <option value="pix">Pix</option>
          </select>
        </div>
        <div class="muted" id="valorEstimado">Valor estimado: R$ 0,00</div>
        <button class="button" type="button" id="solicitarCorrida">Solicitar corrida</button>
      </div>

      <div class="card hidden" id="driverPanel">
        <h2>Painel do motorista</h2>
        <p>Fique online para receber corridas mais proximas.</p>
        <div id="driverMessage" class="message"></div>
        <div class="status-pill" id="driverStatus">Offline</div>
        <button class="button" type="button" id="driverToggle">Ficar online</button>
        <div class="muted" id="driverLocation">Localizacao: nao definida</div>
        <div style="margin-top: 16px;">
          <h3>Corrida atual</h3>
          <div class="ride-item" id="currentRide">Nenhuma corrida aceita.</div>
        </div>
        <div style="margin-top: 16px;">
          <h3>Corridas pendentes</h3>
          <div class="ride-list" id="pendingRides"></div>
        </div>
      </div>

      <div class="card">
        <div id="passengerMap" class="map-box"></div>
        <div id="driverMap" class="map-box hidden"></div>
      </div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
  <script>
    const API_BASE = window.location.origin && window.location.origin.startsWith("http")
      ? window.location.origin
      : "http://localhost:10000";

    let MAPBOX_TOKEN = "";
    let MAPBOX_STYLE = "mapbox://styles/mapbox/streets-v12";

    const sessionRaw = localStorage.getItem("corridaSession");
    const session = sessionRaw ? JSON.parse(sessionRaw) : null;

    if (!session || !session.usuario) {
      window.location.href = "/index.html";
    }

    const usuario = session.usuario;
    const motorista = session.motorista || null;

    const userSummary = document.getElementById("userSummary");
    const passengerPanel = document.getElementById("passengerPanel");
    const driverPanel = document.getElementById("driverPanel");
    const passengerMapEl = document.getElementById("passengerMap");
    const driverMapEl = document.getElementById("driverMap");
    const logoutBtn = document.getElementById("logoutBtn");

    const passengerMessage = document.getElementById("passengerMessage");
    const driverMessage = document.getElementById("driverMessage");

    const origemInput = document.getElementById("origemInput");
    const destinoInput = document.getElementById("destinoInput");
    const origemList = document.getElementById("origemList");
    const destinoList = document.getElementById("destinoList");
    const pagamentoSelect = document.getElementById("pagamentoSelect");
    const valorEstimado = document.getElementById("valorEstimado");
    const solicitarCorridaBtn = document.getElementById("solicitarCorrida");
    const usarLocalizacaoBtn = document.getElementById("usarLocalizacao");

    const driverStatus = document.getElementById("driverStatus");
    const driverToggle = document.getElementById("driverToggle");
    const driverLocation = document.getElementById("driverLocation");
    const pendingRides = document.getElementById("pendingRides");
    const currentRideBox = document.getElementById("currentRide");

    let passengerMap = null;
    let passengerOriginMarker = null;
    let passengerDestinationMarker = null;
    let passengerRouteId = "passenger-route";
    let passengerOriginCoords = null;
    let passengerDestinationCoords = null;
    let passengerDistanceKm = null;
    let passengerMapReady = false;
    let passengerLiveMarker = null;
    let passengerLivePosition = null;
    let passengerWatchId = null;
    let passengerOriginMode = "auto";
    let passengerLastRouteUpdate = 0;
    let passengerAutoLabel = "";

    let driverMap = null;
    let driverMarker = null;
    let pickupMarker = null;
    let dropoffMarker = null;
    let driverRouteId = "driver-route";
    let driverPosition = null;
    let driverOnline = false;
    let driverInRide = false;
    let driverWatchId = null;
    let pendingPoll = null;
    let pendingIds = new Set();
    let currentRide = null;
    let driverRouteTarget = null;
    let lastRouteUpdate = 0;
    let audioContext = null;
    let driverMapReady = false;

    function showMessage(element, type, text) {
      element.className = `message ${type} show`;
      element.textContent = text;
    }

    function clearMessage(element) {
      element.className = "message";
      element.textContent = "";
    }

    async function loadConfig() {
      try {
        const resposta = await fetch(API_BASE + "/config");
        const dados = await resposta.json();
        if (dados && dados.mapboxToken) {
          MAPBOX_TOKEN = dados.mapboxToken;
        }
        if (dados && dados.mapboxStyle) {
          MAPBOX_STYLE = dados.mapboxStyle;
        }
      } catch (erro) {
        showMessage(passengerMessage, "error", "Nao foi possivel carregar configuracoes do servidor.");
        showMessage(driverMessage, "error", "Nao foi possivel carregar configuracoes do servidor.");
        return false;
      }

      if (!MAPBOX_TOKEN) {
        showMessage(passengerMessage, "error", "Chave Mapbox nao configurada no servidor (MAPBOX_TOKEN).");
        showMessage(driverMessage, "error", "Chave Mapbox nao configurada no servidor (MAPBOX_TOKEN).");
        return false;
      }

      return true;
    }

    function updateUserSummary() {
      if (usuario.tipo === "motorista") {
        userSummary.textContent = `Motorista: ${usuario.nome}`;
      } else {
        userSummary.textContent = `Passageiro: ${usuario.nome}`;
      }
    }

    function setupPanels() {
      const isPassenger = usuario.tipo === "passageiro";
      passengerPanel.classList.toggle("hidden", !isPassenger);
      passengerMapEl.classList.toggle("hidden", !isPassenger);
      driverPanel.classList.toggle("hidden", isPassenger);
      driverMapEl.classList.toggle("hidden", isPassenger);
    }

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("corridaSession");
      window.location.href = "/index.html";
    });

    function ensureMapbox() {
      if (!MAPBOX_TOKEN) {
        showMessage(passengerMessage, "error", "Chave Mapbox nao configurada no servidor (MAPBOX_TOKEN).");
        showMessage(driverMessage, "error", "Chave Mapbox nao configurada no servidor (MAPBOX_TOKEN).");
        return false;
      }
      if (!mapboxgl || !mapboxgl.supported()) {
        showMessage(passengerMessage, "error", "Mapbox nao suportado neste navegador.");
        showMessage(driverMessage, "error", "Mapbox nao suportado neste navegador.");
        return false;
      }
      mapboxgl.accessToken = MAPBOX_TOKEN;
      return true;
    }

    function createAutocomplete(input, listEl, onSelect) {
      let debounce = null;

      function closeList() {
        listEl.classList.add("hidden");
        listEl.innerHTML = "";
      }

      input.addEventListener("blur", () => {
        setTimeout(closeList, 150);
      });

      input.addEventListener("input", () => {
        const query = input.value.trim();
        if (query.length < 3) {
          closeList();
          return;
        }

        clearTimeout(debounce);
        debounce = setTimeout(async () => {
          try {
            const results = await forwardGeocode(query, passengerOriginCoords || driverPosition);
            if (!results.length) {
              closeList();
              return;
            }
            listEl.innerHTML = results
              .map((item, index) => `
                <div class="autocomplete-item" data-index="${index}">
                  ${item.label}
                </div>
              `)
              .join("");
            listEl.classList.remove("hidden");
            Array.from(listEl.querySelectorAll(".autocomplete-item")).forEach((el) => {
              el.addEventListener("click", () => {
                const idx = Number(el.dataset.index);
                const item = results[idx];
                if (!item) return;
                input.value = item.label;
                onSelect(item.coords);
                closeList();
              });
            });
          } catch (erro) {
            closeList();
          }
        }, 250);
      });
    }

    async function forwardGeocode(query, proximity) {
      if (!MAPBOX_TOKEN) {
        return [];
      }
      const url = new URL("https://api.mapbox.com/search/geocode/v6/forward");
      url.searchParams.set("q", query);
      url.searchParams.set("access_token", MAPBOX_TOKEN);
      url.searchParams.set("limit", "5");
      url.searchParams.set("types", "address");
      url.searchParams.set("language", "pt");
      url.searchParams.set("country", "br");
      if (proximity && Number.isFinite(proximity.lng) && Number.isFinite(proximity.lat)) {
        url.searchParams.set("proximity", `${proximity.lng},${proximity.lat}`);
      }
      const resposta = await fetch(url.toString());
      const dados = await resposta.json();
      const features = dados.features || [];
      return features.map((feature) => ({
        label: feature.properties?.full_address || feature.properties?.name || feature.place_name || feature.text,
        coords: {
          lng: feature.geometry.coordinates[0],
          lat: feature.geometry.coordinates[1]
        }
      }));
    }

    async function reverseGeocode(coords) {
      if (!MAPBOX_TOKEN) {
        return null;
      }
      const url = new URL("https://api.mapbox.com/search/geocode/v6/reverse");
      url.searchParams.set("longitude", coords.lng);
      url.searchParams.set("latitude", coords.lat);
      url.searchParams.set("access_token", MAPBOX_TOKEN);
      url.searchParams.set("language", "pt");
      const resposta = await fetch(url.toString());
      const dados = await resposta.json();
      const feature = (dados.features || [])[0];
      if (!feature) return null;
      return feature.properties?.full_address || feature.properties?.name || feature.place_name || feature.text;
    }

    async function fetchRoute(origin, destination) {
      if (!MAPBOX_TOKEN) {
        return null;
      }
      const url = new URL(
        `https://api.mapbox.com/directions/v5/mapbox/driving/${origin.lng},${origin.lat};${destination.lng},${destination.lat}`
      );
      url.searchParams.set("access_token", MAPBOX_TOKEN);
      url.searchParams.set("geometries", "geojson");
      url.searchParams.set("overview", "full");
      const resposta = await fetch(url.toString());
      const dados = await resposta.json();
      if (!dados.routes || !dados.routes[0]) {
        return null;
      }
      const rota = dados.routes[0];
      return {
        distanceKm: rota.distance / 1000,
        geometry: rota.geometry
      };
    }

    function setRoute(map, id, geojson, color) {
      if (!map || !geojson) return;
      const source = map.getSource(id);
      if (source) {
        source.setData(geojson);
      } else {
        map.addSource(id, { type: "geojson", data: geojson });
        map.addLayer({
          id,
          type: "line",
          source: id,
          layout: { "line-join": "round", "line-cap": "round" },
          paint: { "line-color": color || "#0e7c86", "line-width": 4 }
        });
      }
    }

    function fitBounds(map, origin, destination) {
      if (!map || !origin || !destination) return;
      const bounds = new mapboxgl.LngLatBounds();
      bounds.extend([origin.lng, origin.lat]);
      bounds.extend([destination.lng, destination.lat]);
      map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
    }

    function initPassengerMap() {
      if (!ensureMapbox()) return;
      passengerMap = new mapboxgl.Map({
        container: "passengerMap",
        style: MAPBOX_STYLE,
        center: [-46.6333, -23.5505],
        zoom: 13
      });

      passengerMap.on("load", () => {
        passengerMapReady = true;
      });

      passengerOriginMarker = new mapboxgl.Marker({ color: "#0e7c86" }).setLngLat([-46.6333, -23.5505]);
      passengerDestinationMarker = new mapboxgl.Marker({ color: "#f97316" }).setLngLat([-46.6333, -23.5505]);
      passengerLiveMarker = new mapboxgl.Marker({ color: "#2563eb" }).setLngLat([-46.6333, -23.5505]);

      startPassengerWatch();
    }

    function updatePassengerMarkers() {
      if (!passengerMap) return;
      if (passengerOriginCoords) {
        passengerOriginMarker.setLngLat([passengerOriginCoords.lng, passengerOriginCoords.lat]).addTo(passengerMap);
      }
      if (passengerDestinationCoords) {
        passengerDestinationMarker.setLngLat([passengerDestinationCoords.lng, passengerDestinationCoords.lat]).addTo(passengerMap);
      }
      if (passengerLivePosition) {
        passengerLiveMarker.setLngLat([passengerLivePosition.lng, passengerLivePosition.lat]).addTo(passengerMap);
      }
      if (passengerOriginCoords && passengerDestinationCoords) {
        fitBounds(passengerMap, passengerOriginCoords, passengerDestinationCoords);
      }
    }

    async function updatePassengerRoute() {
      clearMessage(passengerMessage);
      if (!passengerOriginCoords || !passengerDestinationCoords) {
        return null;
      }

      const route = await fetchRoute(passengerOriginCoords, passengerDestinationCoords);
      if (!route) {
        showMessage(passengerMessage, "error", "Nao foi possivel calcular a rota.");
        return null;
      }

      passengerDistanceKm = route.distanceKm;
      const valor = passengerDistanceKm * 1;
      valorEstimado.textContent = `Valor estimado: R$ ${valor.toFixed(2)} (${passengerDistanceKm.toFixed(2)} km)`;

      if (passengerMapReady) {
        setRoute(passengerMap, passengerRouteId, { type: "Feature", geometry: route.geometry }, "#0e7c86");
      }
      updatePassengerMarkers();
      passengerLastRouteUpdate = Date.now();
      return passengerDistanceKm;
    }

    function startPassengerWatch() {
      if (!navigator.geolocation) {
        showMessage(passengerMessage, "error", "Geolocalizacao nao suportada.");
        return;
      }

      passengerWatchId = navigator.geolocation.watchPosition(
        async (pos) => {
          passengerLivePosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };

          if (passengerOriginMode === "auto") {
            passengerOriginCoords = passengerLivePosition;
            if (!origemInput.value || origemInput.value === passengerAutoLabel) {
              const endereco = await reverseGeocode(passengerOriginCoords);
              if (endereco) {
                passengerAutoLabel = endereco;
                origemInput.value = endereco;
              }
            }
          }

          updatePassengerMarkers();

          if (passengerDestinationCoords) {
            const now = Date.now();
            if (now - passengerLastRouteUpdate > 10000) {
              passengerLastRouteUpdate = now;
              updatePassengerRoute();
            }
          } else if (passengerMapReady && passengerOriginMode === "auto" && passengerLivePosition) {
            passengerMap.setCenter([passengerLivePosition.lng, passengerLivePosition.lat]);
            passengerMap.setZoom(15);
          }
        },
        () => {
          showMessage(passengerMessage, "error", "Nao foi possivel obter sua localizacao.");
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 5000 }
      );
    }

    function initDriverMap() {
      if (!ensureMapbox()) return;
      driverMap = new mapboxgl.Map({
        container: "driverMap",
        style: MAPBOX_STYLE,
        center: [-46.6333, -23.5505],
        zoom: 13
      });

      driverMap.on("load", () => {
        driverMapReady = true;
      });

      driverMarker = new mapboxgl.Marker({ color: "#0e7c86" }).setLngLat([-46.6333, -23.5505]);
      pickupMarker = new mapboxgl.Marker({ color: "#2563eb" }).setLngLat([-46.6333, -23.5505]);
      dropoffMarker = new mapboxgl.Marker({ color: "#f97316" }).setLngLat([-46.6333, -23.5505]);
    }

    function updateDriverMarkers() {
      if (!driverMap || !driverPosition) return;
      driverMarker.setLngLat([driverPosition.lng, driverPosition.lat]).addTo(driverMap);
      if (driverRouteTarget) {
        fitBounds(driverMap, driverPosition, driverRouteTarget);
      } else {
        driverMap.setCenter([driverPosition.lng, driverPosition.lat]);
      }
    }

    async function updateDriverRoute(force) {
      if (!driverRouteTarget || !driverPosition || !driverMapReady) {
        return;
      }
      const now = Date.now();
      if (!force && now - lastRouteUpdate < 10000) {
        return;
      }
      lastRouteUpdate = now;
      const route = await fetchRoute(driverPosition, driverRouteTarget);
      if (!route) return;
      setRoute(driverMap, driverRouteId, { type: "Feature", geometry: route.geometry }, "#2563eb");
      updateDriverMarkers();
    }

    function setDriverTarget(tipo, coords) {
      driverRouteTarget = coords;
      if (tipo === "pickup") {
        pickupMarker.setLngLat([coords.lng, coords.lat]).addTo(driverMap);
        dropoffMarker.remove();
      } else if (tipo === "dropoff") {
        dropoffMarker.setLngLat([coords.lng, coords.lat]).addTo(driverMap);
      }
      updateDriverRoute(true);
    }

    function updateDriverStatus() {
      if (driverInRide) {
        driverStatus.textContent = "Em corrida";
        driverStatus.classList.add("busy");
        driverStatus.classList.remove("online");
        driverToggle.textContent = "Ficar offline";
        return;
      }

      driverStatus.textContent = driverOnline ? "Online" : "Offline";
      driverStatus.classList.toggle("online", driverOnline);
      driverStatus.classList.remove("busy");
      driverToggle.textContent = driverOnline ? "Ficar offline" : "Ficar online";
    }

    function updateDriverLocationDisplay() {
      if (!driverPosition) {
        driverLocation.textContent = "Localizacao: nao definida";
        return;
      }
      driverLocation.textContent = `Localizacao: ${driverPosition.lat.toFixed(5)}, ${driverPosition.lng.toFixed(5)}`;
    }

    function playNotification() {
      if (!audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = "sine";
      osc.frequency.value = 880;
      gain.gain.value = 0.2;
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start();
      osc.stop(audioContext.currentTime + 0.4);
    }

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    async function atualizarMotoristaStatus() {
      if (!motorista) return;
      const disponivel = driverOnline && !driverInRide;
      const payload = { disponivel };
      if (driverPosition) {
        payload.latitude = driverPosition.lat;
        payload.longitude = driverPosition.lng;
      }
      await fetch(API_BASE + `/motoristas/${motorista.id}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    function renderCurrentRide() {
      if (!currentRide) {
        currentRideBox.textContent = "Nenhuma corrida aceita.";
        return;
      }

      let actions = "";
      if (currentRide.status === "motorista_a_caminho") {
        actions = `<button class="button" type="button" onclick="iniciarCorrida()">Iniciar corrida</button>`;
      }
      if (currentRide.status === "em_andamento") {
        actions = `<button class="button" type="button" onclick="finalizarCorrida()">Finalizar corrida</button>`;
      }

      currentRideBox.innerHTML = `
        <strong>Corrida #${currentRide.id}</strong><br>
        Origem: ${currentRide.origem}<br>
        Destino: ${currentRide.destino}<br>
        Valor: R$ ${Number(currentRide.valor || 0).toFixed(2)}<br>
        Status: ${currentRide.status}<br>
        ${actions}
      `;
    }

    function renderPendingRides(lista) {
      if (driverInRide) {
        pendingRides.innerHTML = "<div class=\"ride-item\">Finalize a corrida atual para receber novas.</div>";
        return;
      }
      if (!lista || lista.length === 0) {
        pendingRides.innerHTML = "<div class=\"ride-item\">Nenhuma corrida pendente.</div>";
        return;
      }

      pendingRides.innerHTML = lista
        .map((corrida) => {
          const dist = corrida.distanciaParaMotoristaKm !== null
            ? `${corrida.distanciaParaMotoristaKm.toFixed(2)} km`
            : "distancia nao informada";
          return `
            <div class="ride-item">
              <strong>Corrida #${corrida.id}</strong>
              Origem: ${corrida.origem}<br>
              Destino: ${corrida.destino}<br>
              Valor: R$ ${Number(corrida.valor || 0).toFixed(2)}<br>
              Distancia: ${dist}<br>
              <button class="button" type="button" onclick="aceitarCorrida(${corrida.id})">Aceitar</button>
            </div>
          `;
        })
        .join("");
    }

    async function carregarCorridasPendentes() {
      if (!motorista || !driverOnline || driverInRide) return;

      try {
        const resposta = await fetch(API_BASE + `/corridas/pendentes?motoristaId=${motorista.id}`);
        const dados = await resposta.json();
        const lista = dados.corridas || [];

        const ids = new Set(lista.map((item) => item.id));
        let novo = false;
        ids.forEach((id) => {
          if (!pendingIds.has(id)) {
            novo = true;
          }
        });
        pendingIds = ids;
        if (novo) {
          playNotification();
        }

        renderPendingRides(lista);
      } catch (erro) {
        showMessage(driverMessage, "error", "Nao foi possivel carregar corridas.");
      }
    }

    createAutocomplete(origemInput, origemList, (coords) => {
      passengerOriginMode = "fixed";
      passengerOriginCoords = coords;
      updatePassengerRoute();
    });
    createAutocomplete(destinoInput, destinoList, (coords) => {
      passengerDestinationCoords = coords;
      updatePassengerRoute();
    });

    origemInput.addEventListener("focus", () => {
      passengerOriginMode = "fixed";
    });

    usarLocalizacaoBtn.addEventListener("click", async () => {
      clearMessage(passengerMessage);
      if (!navigator.geolocation) {
        showMessage(passengerMessage, "error", "Geolocalizacao nao suportada.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          passengerOriginMode = "auto";
          passengerOriginCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          const endereco = await reverseGeocode(passengerOriginCoords);
          if (endereco) {
            passengerAutoLabel = endereco;
            origemInput.value = endereco;
          }
          updatePassengerRoute();
        },
        () => {
          showMessage(passengerMessage, "error", "Nao foi possivel obter sua localizacao.");
        },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });

    solicitarCorridaBtn.addEventListener("click", async () => {
      clearMessage(passengerMessage);
      let origemTexto = origemInput.value.trim();
      let destinoTexto = destinoInput.value.trim();

      if (!origemTexto || !destinoTexto) {
        showMessage(passengerMessage, "error", "Informe origem e destino.");
        return;
      }

      try {
        if (!passengerOriginCoords) {
          const results = await forwardGeocode(origemTexto, passengerOriginCoords);
          if (!results[0]) {
            showMessage(passengerMessage, "error", "Origem nao encontrada.");
            return;
          }
          passengerOriginCoords = results[0].coords;
          origemTexto = results[0].label;
          origemInput.value = results[0].label;
        }
        if (!passengerDestinationCoords) {
          const results = await forwardGeocode(destinoTexto, passengerOriginCoords);
          if (!results[0]) {
            showMessage(passengerMessage, "error", "Destino nao encontrado.");
            return;
          }
          passengerDestinationCoords = results[0].coords;
          destinoTexto = results[0].label;
          destinoInput.value = results[0].label;
        }

        const distance = await updatePassengerRoute();
        const distanciaKm = distance ? Number(distance.toFixed(2)) : null;
        const pagamentoMetodo = pagamentoSelect.value;

        const resposta = await fetch(API_BASE + "/corridas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            passageiroId: usuario.id,
            origem: origemTexto,
            destino: destinoTexto,
            origemLat: passengerOriginCoords.lat,
            origemLng: passengerOriginCoords.lng,
            destinoLat: passengerDestinationCoords.lat,
            destinoLng: passengerDestinationCoords.lng,
            distanciaKm,
            pagamentoMetodo
          })
        });
        const dados = await resposta.json();

        if (!dados.ok) {
          showMessage(passengerMessage, "error", dados.mensagem || "Falha ao solicitar corrida.");
          return;
        }

        showMessage(passengerMessage, "success", "Corrida solicitada! Aguardando motorista.");
      } catch (erro) {
        showMessage(passengerMessage, "error", "Nao foi possivel solicitar a corrida.");
      }
    });

    driverToggle.addEventListener("click", async () => {
      clearMessage(driverMessage);

      if (!navigator.geolocation) {
        showMessage(driverMessage, "error", "Geolocalizacao nao suportada.");
        return;
      }

      ensureAudioContext();
      driverOnline = !driverOnline;
      updateDriverStatus();

      if (!driverOnline) {
        if (driverWatchId !== null) {
          navigator.geolocation.clearWatch(driverWatchId);
          driverWatchId = null;
        }
        clearInterval(pendingPoll);
        pendingPoll = null;
        pendingIds = new Set();
        await atualizarMotoristaStatus();
        return;
      }

      pendingIds = new Set();
      driverWatchId = navigator.geolocation.watchPosition(
        async (pos) => {
          driverPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          updateDriverLocationDisplay();
          updateDriverMarkers();
          await atualizarMotoristaStatus();
          updateDriverRoute(false);
          await carregarCorridasPendentes();
        },
        () => {
          showMessage(driverMessage, "error", "Nao foi possivel obter localizacao.");
        },
        { enableHighAccuracy: true, timeout: 8000 }
      );

      pendingPoll = setInterval(carregarCorridasPendentes, 6000);
    });

    window.aceitarCorrida = async function (id) {
      clearMessage(driverMessage);
      try {
        const resposta = await fetch(API_BASE + `/corridas/${id}/aceitar`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ motoristaId: motorista.id })
        });
        const dados = await resposta.json();

        if (!dados.ok) {
          showMessage(driverMessage, "error", dados.mensagem || "Falha ao aceitar.");
          return;
        }

        currentRide = dados.corrida;
        driverInRide = true;
        updateDriverStatus();
        renderCurrentRide();
        renderPendingRides([]);
        await atualizarMotoristaStatus();

        if (currentRide.origemLat && currentRide.origemLng) {
          setDriverTarget("pickup", { lat: currentRide.origemLat, lng: currentRide.origemLng });
        }
      } catch (erro) {
        showMessage(driverMessage, "error", "Nao foi possivel aceitar a corrida.");
      }
    };

    window.iniciarCorrida = async function () {
      if (!currentRide) return;
      clearMessage(driverMessage);

      try {
        const resposta = await fetch(API_BASE + `/corridas/${currentRide.id}/iniciar`, { method: "PUT" });
        const dados = await resposta.json();

        if (!dados.ok) {
          showMessage(driverMessage, "error", dados.mensagem || "Falha ao iniciar.");
          return;
        }

        currentRide = dados.corrida;
        renderCurrentRide();

        if (currentRide.destinoLat && currentRide.destinoLng) {
          setDriverTarget("dropoff", { lat: currentRide.destinoLat, lng: currentRide.destinoLng });
        } else {
          showMessage(driverMessage, "error", "Destino sem coordenadas.");
        }
      } catch (erro) {
        showMessage(driverMessage, "error", "Nao foi possivel iniciar a corrida.");
      }
    };

    window.finalizarCorrida = async function () {
      if (!currentRide) return;
      clearMessage(driverMessage);

      try {
        const resposta = await fetch(API_BASE + `/corridas/${currentRide.id}/finalizar`, { method: "PUT" });
        const dados = await resposta.json();

        if (!dados.ok) {
          showMessage(driverMessage, "error", dados.mensagem || "Falha ao finalizar.");
          return;
        }

        currentRide = null;
        driverInRide = false;
        updateDriverStatus();
        renderCurrentRide();
        if (driverMap && driverMap.getSource(driverRouteId)) {
          driverMap.removeLayer(driverRouteId);
          driverMap.removeSource(driverRouteId);
        }
        pickupMarker?.remove();
        dropoffMarker?.remove();
        driverRouteTarget = null;
        await atualizarMotoristaStatus();
        await carregarCorridasPendentes();
      } catch (erro) {
        showMessage(driverMessage, "error", "Nao foi possivel finalizar.");
      }
    };

    function initApp() {
      updateUserSummary();
      setupPanels();

      if (usuario.tipo === "passageiro") {
        initPassengerMap();
      } else {
        initDriverMap();
        updateDriverStatus();
        renderCurrentRide();
        renderPendingRides([]);
        if (!motorista) {
          showMessage(driverMessage, "error", "Perfil de motorista nao encontrado.");
          driverToggle.disabled = true;
        }
      }
    }

    loadConfig().then((ok) => {
      if (ok) {
        initApp();
      }
    });
  </script>
</body>
</html>
